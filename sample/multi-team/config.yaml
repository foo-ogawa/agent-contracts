# Multi-team configuration example
# Rename to agent-contracts.config.yaml in your project, or use -c to specify.

teams:
  _defaults:
    vars:
      language: TypeScript

  backend:
    dsl: ./backend-team.yaml
    interface_output: ./backend-team-interface.yaml
    vars:
      team_name: backend

  qa:
    dsl: ./qa-consumer.yaml
    vars:
      team_name: qa
