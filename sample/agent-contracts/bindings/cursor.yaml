software: cursor
version: 1

guardrail_impl:
  no-force-push:
    checks:
      - hook_event: beforeShellExecution
        matcher:
          type: command_regex
          pattern: "git\\s+push\\s+.*--force"
        message: "Force push is forbidden per project guardrails"
      - hook_event: beforeShellExecution
        matcher:
          type: command_regex
          pattern: "git\\s+push\\s+.*-f\\b"
        message: "Force push (-f) is forbidden per project guardrails"

  no-rebase:
    checks:
      - hook_event: beforeShellExecution
        matcher:
          type: command_regex
          pattern: "git\\s+rebase"
        message: "Rebase is prohibited; use merge instead"

  english-only-code:
    checks:
      - hook_event: afterFileEdit
        matcher:
          type: content_regex
          pattern: "[\\u3040-\\u309F\\u30A0-\\u30FF\\u4E00-\\u9FFF]"
          file_glob: "src/**/*.{ts,rs,py}"
          exclude_glob: "*.md"
        message: "Japanese characters detected in source code"

  test-before-commit:
    checks:
      - hook_event: beforeShellExecution
        matcher:
          type: command_regex
          pattern: "git\\s+commit"
        message: "Ensure tests pass before committing"

outputs:
  hook-script:
    target: "{cursor_root}/hooks/guardrail-hook.sh"
    mode: write
    executable: true
    inline_template: |
      #!/bin/bash
      # Auto-generated by agent-contracts. Do not edit manually.
      set -uo pipefail

      INPUT=$(cat /dev/stdin 2>/dev/null || echo '{}')
      COMMAND=$(echo "$INPUT" | jq -r '.command // empty' 2>/dev/null || echo "")

      FINAL_EXIT=0

      {{#each resolved_checks}}
      # --- {{this.guardrail_id}} ({{this.policy_rule.severity}} / {{this.policy_rule.action}}) ---
      {{#if this.check.matcher}}
      if echo "$COMMAND" | grep -qP '{{this.check.matcher.pattern}}'; then
        {{#if (eq this.policy_rule.action "block")}}
        echo "BLOCKED: {{this.check.message}}" >&2
        FINAL_EXIT=1
        {{else if (eq this.policy_rule.action "warn")}}
        echo "WARNING: {{this.check.message}}" >&2
        {{else if (eq this.policy_rule.action "shadow")}}
        : # shadow mode — detection only
        {{else}}
        echo "INFO: {{this.check.message}}" >&2
        {{/if}}
      fi
      {{/if}}

      {{/each}}

      exit $FINAL_EXIT

  policy-bundle:
    target: "{cursor_root}/guardrails/policy.json"
    mode: patch
    format: json
    patch_strategy: deep_merge
    array_merge_key: guardrail_id
    inline_template: |
      {"checks":{{json resolved_checks}},"meta":{"cursor_binding":true}}
