software: observability
version: 1

outputs:
  event-schema:
    target: "{observability_root}/guardrail-events.yaml"
    mode: write
    inline_template: |
      # Auto-generated by agent-contracts. Do not edit manually.
      # Guardrail event schema for observability engine
      guardrail_events:
        event_prefix: guardrail
        active_policy: "{{policy.description}}"
        guardrails:
      {{#each policy.rules}}
          - id: {{this.guardrail}}
            severity: {{this.severity}}
            action: {{this.action}}
            allow_override: {{this.allow_override}}
      {{/each}}
        event_types:
          - guardrail.check.started
          - guardrail.check.matched
          - guardrail.outcome

reporting:
  commands:
    on_started: >-
      observ emit guardrail.check.started
      --guardrail-id {{guardrail_id}}
      --source {{source}}
    on_matched: >-
      observ emit guardrail.check.matched
      --guardrail-id {{guardrail_id}}
      --action {{action}}
      --severity {{severity}}
      --source {{source}}
    on_outcome: >-
      observ emit guardrail.outcome
      --guardrail-id {{guardrail_id}}
      --outcome {{outcome}}
      --source {{source}}
  fail_open: true
  timeout_ms: 5000
