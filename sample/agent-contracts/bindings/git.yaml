software: git
version: 1

guardrail_impl:
  no-force-push:
    checks:
      - git_hook: pre-push
        script: |
          #!/bin/bash
          while read local_ref local_sha remote_ref remote_sha; do
            REMOTE_BRANCH=$(echo "$remote_ref" | sed 's|refs/heads/||')
            if [ "$REMOTE_BRANCH" = "main" ] || [ "$REMOTE_BRANCH" = "master" ]; then
              FORCE_PUSH=$(git log --oneline "$remote_sha..$local_sha" 2>/dev/null | wc -l)
              if [ "$FORCE_PUSH" -eq 0 ] && [ "$remote_sha" != "0000000000000000000000000000000000000000" ]; then
                exit 1
              fi
            fi
          done
          exit 0
        message: "Force push to main/master is blocked"

  english-only-code:
    checks:
      - git_hook: pre-commit
        script: |
          #!/bin/bash
          FILES=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(ts|rs|py)$' | grep -v '\.md$' || true)
          for f in $FILES; do
            if grep -P '[\x{3040}-\x{309F}\x{30A0}-\x{30FF}\x{4E00}-\x{9FFF}]' "$f" >/dev/null 2>&1; then
              exit 1
            fi
          done
          exit 0
        message: "Japanese characters in source files"

outputs:
  hook-scripts:
    target: "{git_hooks_root}/"
    mode: write
    group_by: git_hook
    executable: true
    inline_template: |
      #!/bin/bash
      # Auto-generated by agent-contracts. Do not edit manually.
      set -uo pipefail

      FINAL_EXIT=0

      {{#each resolved_checks}}
      # --- {{this.guardrail_id}} ({{this.policy_rule.severity}} / {{this.policy_rule.action}}) ---
      CHECK_RESULT=0
      (
      {{this.check.script}}
      ) || CHECK_RESULT=$?

      if [ "$CHECK_RESULT" -ne 0 ]; then
        {{#if (eq this.policy_rule.action "block")}}
        echo "BLOCKED: {{this.check.message}}" >&2
        FINAL_EXIT=1
        {{else if (eq this.policy_rule.action "warn")}}
        echo "WARNING: {{this.check.message}}" >&2
        {{else if (eq this.policy_rule.action "shadow")}}
        : # shadow mode — detection only
        {{/if}}
      fi

      {{/each}}

      exit $FINAL_EXIT
